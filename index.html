<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THỬ THÁCH ĐƯỜNG THẲNG – TIA – ĐOẠN THẲNG</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:linear-gradient(135deg,#dff6ff,#fff4c2,#ffe0b2);}
.wrap{max-width:900px;margin:auto;padding:20px}
h1{text-align:center;color:#e67e22}
.card{background:#fff;border-radius:20px;padding:25px;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:fade .4s}
@keyframes fade{from{opacity:0;transform:translateY(15px)}to{opacity:1}}
.answers button{display:block;width:100%;margin:10px 0;padding:12px;border:none;border-radius:12px;background:#eef;cursor:pointer}
.answers button.selected{background:#ffd27f}
.answers button:hover{transform:scale(1.02)}
#submitBtn,#nextBtn,#retryBtn,#restartBtn{padding:12px 25px;border:none;border-radius:12px;font-size:18px;cursor:pointer}
#submitBtn{background:#27ae60;color:white}
#nextBtn{background:#3498db;color:white}
#retryBtn,#restartBtn{background:#f39c12;color:white}
.msg{text-align:center;font-size:22px;font-weight:bold;margin:15px}
.correct{color:green}.wrong{color:#c0392b}
svg{text-anchor:middle}
.top{text-align:center}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
<div class="top">
<h1>📏📐 THỬ THÁCH ĐƯỜNG THẲNG – TIA – ĐOẠN THẲNG 🎯⭐</h1>
<p>Các con hãy quan sát hình vẽ và chọn đáp án đúng nhé!</p>
</div>
<div id="game"></div>
</div>
<script>
const questions=[
{q:"Quan sát hình vẽ. Đối tượng được biểu diễn là:",svg:`<svg width="320" height="90"><line x1="60" y1="40" x2="260" y2="40" stroke="black" stroke-width="4"/><circle cx="60" cy="40" r="5"/><circle cx="260" cy="40" r="5"/><text x="60" y="70">A</text><text x="260" y="70">B</text></svg>`,a:["Đường thẳng AB","Tia AB","Đoạn thẳng AB","Góc AB"],c:2},
{q:"Quan sát hình vẽ. Đối tượng được biểu diễn là:",svg:`<svg width="320" height="90"><line x1="50" y1="40" x2="300" y2="40" stroke="black" stroke-width="4"/><circle cx="50" cy="40" r="5"/><circle cx="160" cy="40" r="5"/><text x="50" y="70">A</text><text x="160" y="70">B</text></svg>`,a:["Đường thẳng AB","Tia AB","Đoạn thẳng AB","Đường tròn"],c:1},
{q:"Quan sát hình vẽ. Đối tượng được biểu diễn là:",svg:`<svg width="320" height="90"><line x1="20" y1="40" x2="300" y2="40" stroke="black" stroke-width="4"/><circle cx="110" cy="40" r="5"/><circle cx="210" cy="40" r="5"/><text x="110" y="70">A</text><text x="210" y="70">B</text></svg>`,a:["Đường thẳng AB","Tia AB","Đoạn thẳng AB","Góc A"],c:0},
{q:"Đoạn thẳng AB là hình có:",svg:"",a:["1 điểm đầu","1 điểm cuối","2 điểm đầu mút","Không có điểm đầu mút"],c:2},
{q:"Tia AB là hình có:",svg:"",a:["Điểm gốc là A","Điểm gốc là B","Không có điểm gốc","Hai điểm gốc"],c:0},
{q:"Đường thẳng có:",svg:"",a:["Một đầu mút","Hai đầu mút","Không có đầu mút","Một điểm gốc"],c:2},
{q:"Điểm M nằm giữa A và B. Biết AM = 5 cm, MB = 3 cm. Độ dài đoạn AB bằng:",svg:"",a:["2 cm","5 cm","8 cm","15 cm"],c:2},
{q:"Điểm M nằm giữa A và B. Biết AB = 12 cm, AM = 5 cm. Độ dài đoạn MB bằng:",svg:"",a:["5 cm","6 cm","7 cm","17 cm"],c:2},
{q:"Trên một đường thẳng có ba điểm A, B, C. Điểm B nằm giữa A và C. AB = 4 cm, BC = 6 cm. Độ dài AC bằng:",svg:"",a:["2 cm","10 cm","24 cm","12 cm"],c:1},
{q:"Biết AB = 20 cm, M là trung điểm của đoạn AB. Độ dài đoạn AM là:",svg:"",a:["5 cm","10 cm","15 cm","20 cm"],c:1}
];
let current=0, selected=null, correct=0;
function beep(freq,dur){const a=new(window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator();const g=a.createGain();o.frequency.value=freq;o.connect(g);g.connect(a.destination);o.start();g.gain.setValueAtTime(.1,a.currentTime);o.stop(a.currentTime+dur);}
function render(){
 const q=questions[current];
 document.getElementById('game').innerHTML=`<div class="card">
 <h2>Câu ${current+1}</h2>${q.svg}<p>${q.q}</p>
 <div class="answers">${q.a.map((x,i)=>`<button onclick="pick(${i},this)">${String.fromCharCode(65+i)}. ${x}</button>`).join('')}</div>
 <div style="text-align:center"><button id="submitBtn" class="hidden" onclick="submitAns()">NỘP BÀI</button></div>
 <div id="msg" class="msg"></div>
 <div style="text-align:center"><button id="nextBtn" class="hidden" onclick="nextQ()">CÂU TIẾP THEO</button><button id="retryBtn" class="hidden" onclick="render()">THỬ LẠI</button></div>
 </div>`;
 selected=null;
}
function pick(i,el){
 document.querySelectorAll('.answers button').forEach(b=>b.classList.remove('selected'));
 el.classList.add('selected'); selected=i;
 document.getElementById('submitBtn').classList.remove('hidden');
}
function submitAns(){
 const q=questions[current];
 if(selected===q.c){
   correct++; beep(700,.2);
   document.getElementById('msg').innerHTML='<span class="correct">🎉 Chính xác!</span>';
   document.getElementById('nextBtn').classList.remove('hidden');
   document.getElementById('submitBtn').classList.add('hidden');
 }else{
   beep(200,.3);
   document.getElementById('msg').innerHTML='<span class="wrong">💪 Con hãy suy nghĩ lại nhé!</span>';
   document.getElementById('retryBtn').classList.remove('hidden');
 }
}
function nextQ(){
 current++;
 if(current>=questions.length){
 let rate=Math.round(correct/questions.length*100);
 let nx=correct==10?'🎉 Xuất sắc!':correct>=8?'👏 Rất tốt!':correct>=6?'😊 Khá lắm!':'💪 Cố gắng thêm nhé!';
 document.getElementById('game').innerHTML=`<div class="card"><h2>TỔNG KẾT</h2><p>Đúng: ${correct}/10</p><p>Tỉ lệ hoàn thành: ${rate}%</p><h3>${nx}</h3><button id="restartBtn" onclick="location.reload()">CHƠI LẠI</button></div>`;
 } else render();
}
render();
</script>
</body>
</html>
